<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulino Flow - System Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #F8FAFB;
            --accent: #7F8CAA;
            --background: #0A0A0E;
            --glass-bg: rgba(20, 20, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--background);
            color: var(--primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .dot-grid {
            position: fixed; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .clip-corners {
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }
        .scanline::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.02) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }
        .tech-text { letter-spacing: 0.2em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        input:focus { outline: none; border-color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body class="scanline flex items-center justify-center min-h-screen">
    <div class="dot-grid"></div>

    <div class="glass p-10 w-full max-w-md clip-corners relative z-10 animate-fade-in">
        <div class="flex flex-col items-center mb-10">
            <div class="h-16 w-16 bg-white/5 rounded-2xl flex items-center justify-center mb-4 border border-white/10">
                <i data-lucide="shield-check" class="h-8 w-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">System <span class="text-accent">Auth</span></h1>
            <p class="tech-text text-[9px] opacity-40 mt-2">Dinus Kulino Cloud Access</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="tech-text text-[9px] opacity-40 block mb-2 px-1">Access_Identifier_PIN</label>
                <input type="password" id="d-pin" required
                    class="w-full bg-white/5 border border-white/5 p-4 rounded-xl tech-text text-[11px] transition-all text-center tracking-[1em]"
                    placeholder="****">
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full py-4 bg-white text-black tech-text text-[10px] font-black hover:bg-white/80 transition-all flex items-center justify-center gap-2 group">
                <span>AUTHORIZE_HUB_SESSION</span>
                <i data-lucide="unlock" class="h-4 w-4 group-hover:scale-110 transition-transform"></i>
            </button>
        </form>

        <div id="status" class="mt-8 text-[10px] tech-text text-center opacity-0 transition-opacity">
            VALIDATING_ACCESS_LINK...
        </div>
    </div>

    <script>
        lucide.createIcons();
        const form = document.getElementById('login-form');
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            status.style.opacity = "1";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const pin = document.getElementById('d-pin').value;
            sessionStorage.setItem('d_pin', pin);

            status.innerText = "ACCESS_GRANTED_DECRYPTING...";
            setTimeout(() => { window.location.href = "/"; }, 500);
        };
    </script>
</body>
</html>
