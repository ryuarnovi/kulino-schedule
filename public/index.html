<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulino Flow - Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light Mode - Slate & Mist (Enhanced Contrast) */
            --primary: #1A1B27;
            --primary-rgb: 26, 27, 39;
            --primary-fg: #FFFFFF;
            --secondary: #475569;
            --accent: #1E293B;
            --accent-fg: #FFFFFF;
            --surface: #F1F5F9; 
            --background: #F8FAFC; 
            --background-rgb: 248, 250, 252;
            --text-main: #0F172A;
            --text-muted: #475569;
            --glass-bg: rgba(255, 255, 255, 0.95); 
            --glass-border: rgba(15, 23, 42, 0.08);
            
            /* Background Elements */
            --bg-accent-1: rgba(59, 130, 246, 0.05);
            --bg-accent-2: rgba(168, 85, 247, 0.03);
            --bg-accent-3: rgba(0, 0, 0, 0.01);
            --pattern-opacity: 0.06;
        }

        :root.dark {
            /* Dark Mode - Deep Space */
            --primary: #60A5FA;
            --primary-rgb: 96, 165, 250;
            --primary-fg: #0F172A;
            --secondary: #A78BFA;
            --accent: #F472B6;
            --accent-fg: #FFFFFF;
            --surface: #1E293B;
            --background: #020617;
            --background-rgb: 2, 6, 23;
            --text-main: #F8FAF7;
            --text-muted: #94A3B8;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);

            /* Background Elements */
            --bg-accent-1: rgba(59, 130, 246, 0.1);
            --bg-accent-2: rgba(168, 85, 247, 0.05);
            --bg-accent-3: rgba(255, 255, 255, 0.02);
            --pattern-opacity: 0.08;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-feature-settings: "ss01", "ss02", "cv01", "cv02";
            transition: background-color 0.5s ease, color 0.5s ease;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 15px 35px -5px rgba(0, 0, 0, 0.05),
                0 5px 15px -5px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .dark .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(200%) brightness(0.8);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
        }

        .clip-corners {
            clip-path: polygon(
                15px 0%, 100% 0%, 
                100% calc(100% - 15px), 
                calc(100% - 15px) 100%, 
                0% 100%, 0% 15px
            );
        }

        .hud-border {
            position: relative;
            border: 1px solid var(--glass-border);
        }

        .hud-border::before,
        .hud-border::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: var(--primary);
            border-style: solid;
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
        }

        .hud-border::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .hud-border::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--text-muted) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: var(--pattern-opacity);
            pointer-events: none;
            z-index: -1;
        }

        .tech-text {
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-family: inherit;
            font-weight: 800;
        }

        .scanline::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(var(--primary-rgb), 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--background); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="selection:bg-blue-500/30 dark scanline">
    <div class="dot-grid"></div>
    <div class="max-w-[1400px] mx-auto min-h-screen flex flex-col md:flex-row relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 lg:w-72 p-6 flex flex-col gap-8 border-r border-slate-800/10 glass shrink-0">
            <div class="flex items-center gap-3 px-2">
                <div class="h-10 w-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg clip-corners-sm">
                    <i data-lucide="graduation-cap" class="text-white h-6 w-6"></i>
                </div>
                <span class="text-2xl font-black tracking-tight text-main italic">PROJECT <span class="text-primary">FLOW</span></span>
            </div>

            <nav class="flex flex-col gap-2">
                <button onclick="filterType('all')" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600/10 text-blue-500 border border-blue-600/20 font-bold transition-all group nav-btn w-full">
                    <i data-lucide="layout-grid" class="h-5 w-5"></i>
                    <span class="font-medium">Semua Tugas</span>
                </button>
                <button onclick="filterType('urgent')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-white/5 transition-all text-slate-500 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white group nav-btn w-full">
                    <i data-lucide="alert-triangle" class="h-5 w-5 group-hover:text-rose-500"></i>
                    <span class="font-medium">Mendekati Deadline</span>
                </button>
                <button onclick="filterType('completed')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-white/5 transition-all text-slate-500 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white group nav-btn">
                    <i data-lucide="check-circle" class="h-5 w-5 group-hover:text-emerald-500"></i>
                    <span class="font-medium">Sudah Selesai</span>
                </button>
            </nav>

            <div class="mt-auto glass p-6 rounded-2xl">
                <p class="text-xs text-slate-500 mb-1">Status Sistem</p>
                <div class="flex items-center gap-2 text-emerald-400 font-semibold mb-3">
                    <div class="h-2 w-2 bg-emerald-500 rounded-full"></div>
                    Auto Scraper Aktif
                </div>
                <button onclick="loadData()" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm font-medium transition-all">
                    Refresh Dashboard
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Header -->
            <header class="h-20 border-b border-slate-800/50 flex items-center justify-between px-8 bg-slate-950/20 backdrop-blur-md sticky top-0 z-50">
                <div class="relative w-full max-w-lg">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500"></i>
                    <input type="text" id="search-input" placeholder="Cari berdasarkan tugas atau matakuliah..." 
                           class="w-full pl-12 pr-4 py-2.5 rounded-xl text-sm bg-white/5 border border-white/10 focus:outline-none focus:border-primary/50 text-white placeholder:text-slate-600"
                           oninput="handleSearch()">
                </div>
                
                <div class="flex items-center gap-6">
                    <button onclick="toggleTheme()" class="h-10 w-10 glass rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                        <i data-lucide="sun" id="theme-icon" class="h-5 w-5 text-amber-500"></i>
                    </button>
                    <div class="hidden lg:flex flex-col items-end">
                        <span class="tech-text text-[10px] text-muted font-black">Sync Status</span>
                        <span id="last-update" class="text-sm font-bold text-primary opacity-80">Online</span>
                    </div>
                </div>
            </header>

            <!-- Stats Bar -->
            <div class="px-8 pt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-5 rounded-2xl border-l-4 border-primary shadow-lg overflow-hidden group">
                    <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
                        <i data-lucide="clipboard-list" class="h-16 w-16"></i>
                    </div>
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total Tugas</span>
                        <i data-lucide="clipboard-list" class="h-3.5 w-3.5 text-primary"></i>
                    </div>
                    <div class="text-2xl font-black" id="stat-total">0</div>
                    <p class="text-[9px] text-slate-400 mt-1">Seluruh tugas</p>
                </div>
                
                <div class="glass p-5 rounded-2xl border-l-4 border-amber-500 shadow-lg overflow-hidden group">
                    <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
                        <i data-lucide="graduation-cap" class="h-16 w-16"></i>
                    </div>
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest">Mata Kuliah</span>
                        <i data-lucide="graduation-cap" class="h-3.5 w-3.5 text-amber-500"></i>
                    </div>
                    <div class="text-2xl font-black" id="stat-courses">0</div>
                    <p class="text-[9px] text-slate-400 mt-1">Bidang studi aktif</p>
                </div>

                <div class="glass p-5 rounded-2xl border-l-4 border-rose-500 shadow-lg overflow-hidden group">
                    <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
                        <i data-lucide="alert-circle" class="h-16 w-16"></i>
                    </div>
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest">Urgent</span>
                        <i data-lucide="alert-circle" class="h-3.5 w-3.5 text-rose-500"></i>
                    </div>
                    <div class="text-2xl font-black" id="stat-urgent">0</div>
                    <p class="text-[9px] text-slate-400 mt-1">Deadline dekat</p>
                </div>

                <div class="glass p-5 rounded-2xl border-l-4 border-emerald-500 shadow-lg overflow-hidden group">
                    <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
                        <i data-lucide="check-circle" class="h-16 w-16"></i>
                    </div>
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest">Selesai</span>
                        <i data-lucide="check-circle" class="h-3.5 w-3.5 text-emerald-500"></i>
                    </div>
                    <div class="text-2xl font-black" id="stat-done">0</div>
                    <p class="text-[9px] text-slate-400 mt-1">Tugas disubmit</p>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="px-8 pb-12 pt-4 overflow-y-auto">
                <div id="grid-container" class="space-y-12">
                     <div class="flex flex-col items-center justify-center py-20 opacity-50">
                        <div class="animate-spin h-10 w-10 border-4 border-primary border-t-transparent rounded-full mb-4"></div>
                        <p class="font-bold tech-text text-sm">Synchronizing Database...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allData = [];
        let filteredData = [];

        async function init() {
            lucide.createIcons();
            await loadData();
        }

        async function loadData() {
            try {
                const container = document.getElementById('grid-container');
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20">
                        <div class="animate-spin h-12 w-12 border-4 border-primary border-t-transparent rounded-full mb-6"></div>
                        <p class="font-black text-xl tech-text animate-pulse">Scanning Kulino...</p>
                        <p class="text-slate-500 text-sm mt-2">Mencari deadline dan tugas terbaru...</p>
                    </div>
                `;

                // 1. Try Cache
                let res = await fetch('/deadlines.json?t=' + Date.now()).catch(() => null);
                let data = [];
                if (res && res.ok) data = await res.json().catch(() => []);

                // 2. Fallback to API Scrape if empty
                if (data.length === 0) {
                    res = await fetch('/api/scrape?t=' + Date.now());
                    if (!res.ok) throw new Error('Live Scrape Failed');
                    data = await res.json();
                }

                allData = Array.isArray(data) ? data : [];
                
                // Sort by deadline
                allData.sort((a, b) => {
                    if (a.deadlineTimestamp && b.deadlineTimestamp) return a.deadlineTimestamp - b.deadlineTimestamp;
                    return 0;
                });

                filteredData = [...allData];
                updateStats();
                renderGrid();
                
            } catch (e) {
                console.error(e);
                document.getElementById('grid-container').innerHTML = `
                    <div class="text-center py-32 glass rounded-3xl border-dashed">
                        <i data-lucide="alert-circle" class="h-12 w-12 text-rose-500 mx-auto mb-4"></i>
                        <h2 class="text-xl font-bold mb-2">Koneksi Error</h2>
                        <p class="text-rose-400 font-mono text-xs mb-6 px-4 py-2 bg-rose-500/10 rounded-lg inline-block">${e.message}</p>
                        <br>
                        <button onclick="loadData()" class="px-8 py-3 bg-primary text-primary-fg rounded-xl font-bold transition-all hover:scale-105 active:scale-95">
                            Coba Lagi
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function updateStats() {
            const courseSet = new Set(allData.map(i => i.course));
            const now = Date.now();
            const h3 = 3 * 24 * 60 * 60 * 1000;
            const urgentCount = allData.filter(i => !i.isSubmitted && i.deadlineTimestamp && (i.deadlineTimestamp - now) <= h3 && (i.deadlineTimestamp - now) > 0).length;
            const doneCount = allData.filter(i => i.isSubmitted).length;

            document.getElementById('stat-total').innerText = allData.length;
            document.getElementById('stat-courses').innerText = courseSet.size;
            document.getElementById('stat-urgent').innerText = urgentCount;
            document.getElementById('stat-done').innerText = doneCount;

            if (allData.length > 0) {
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 opacity-40">
                        <div class="p-8 rounded-full bg-slate-500/5 mb-6">
                            <i data-lucide="clipboard-x" class="h-16 w-16 text-slate-400"></i>
                        </div>
                        <h3 class="text-xl font-black tech-text tracking-widest text-slate-500">DATA KOSONG</h3>
                        <p class="text-sm mt-2 text-slate-400">Tidak ada tugas dalam kategori ini</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // Group by Course
            const groups = filteredData.reduce((acc, item) => {
                const c = item.course || "Lainnya";
                if (!acc[c]) acc[c] = [];
                acc[c].push(item);
                return acc;
            }, {});

            container.innerHTML = Object.entries(groups).map(([courseName, items], gIdx) => {
                const now = Date.now();
                const h3 = 3 * 24 * 60 * 60 * 1000;

                return `
                <div class="animate-fade-in" style="animation-delay: ${gIdx * 50}ms">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="h-10 w-1.5 bg-primary rounded-full"></div>
                        <h2 class="text-lg font-black text-main flex items-center gap-2 italic">
                            ${courseName}
                            <span class="text-[9px] text-slate-400 dark:text-slate-500 font-bold not-italic bg-black/5 dark:bg-white/5 px-2.5 py-0.5 rounded-full border border-black/5 dark:border-white/10 tracking-widest uppercase">${items.length} Tasks</span>
                        </h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${items.map(item => {
                            const isDone = item.isSubmitted;
                            const isUrgent = !isDone && item.deadlineTimestamp && (item.deadlineTimestamp - now) <= h3 && (item.deadlineTimestamp - now) > 0;
                            const deadlineLabel = item.deadline || (item.deadlineTimestamp ? new Date(item.deadlineTimestamp).toLocaleDateString() : '');

                            return `
                                <div class="glass p-6 clip-corners hud-border hover-lift flex flex-col group relative overflow-hidden h-full ${isDone ? 'opacity-60 saturate-50' : ''}">
                                    ${isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-widest animate-pulse z-20">Urgent</div>` : ''}
                                    ${isDone ? `<div class="absolute top-0 right-0 bg-emerald-500 text-white text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-widest z-20">Selesai</div>` : ''}
                                    
                                    <h4 class="text-base font-bold leading-tight ${isDone ? 'text-slate-400 line-through' : 'text-main'} group-hover:text-primary transition-colors mb-4">${item.title}</h4>
                                    
                                    ${deadlineLabel ? `
                                        <div class="flex items-center gap-2 ${isDone ? 'text-emerald-400' : (isUrgent ? 'text-rose-400' : 'text-slate-500')} text-[10px] font-bold mb-4 bg-black/5 dark:bg-white/5 w-fit px-3 py-1.5 rounded-lg border border-black/5 dark:border-white/10 uppercase tracking-tighter">
                                            <i data-lucide="${isDone ? 'check-circle' : 'clock'}" class="h-3.5 w-3.5"></i>
                                            <span>${isDone ? 'Sudah Dikumpulkan' : deadlineLabel}</span>
                                        </div>
                                    ` : ''}

                                    <div class="mt-auto space-y-3">
                                        <div class="h-[1px] w-full bg-slate-500/10"></div>
                                        <div class="flex items-center justify-between">
                                            <a href="${item.url}" target="_blank" class="text-[10px] font-black tech-text text-primary hover:brightness-150 transition-all flex items-center gap-1.5">
                                                BUKA SISTEM <i data-lucide="external-link" class="h-3 w-3"></i>
                                            </a>
                                            <span class="text-[9px] text-slate-500 font-mono">${item.type ? item.type.toUpperCase() : 'TASK'}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            filteredData = allData.filter(item => 
                item.title.toLowerCase().includes(term) || 
                item.course.toLowerCase().includes(term)
            );
            renderGrid();
        }

        function filterType(type) {
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => {
                b.classList.remove('bg-blue-600/10', 'text-blue-500', 'border-blue-600/20', 'font-bold');
                b.classList.add('text-slate-500', 'dark:text-slate-300');
            });
            event.currentTarget.classList.add('bg-blue-600/10', 'text-blue-500', 'border-blue-600/20', 'font-bold');
            event.currentTarget.classList.remove('text-slate-500', 'dark:text-slate-300');

            if (type === 'all') filteredData = [...allData];
            else if (type === 'urgent') {
                const now = Date.now();
                const h3 = 3 * 24 * 60 * 60 * 1000;
                filteredData = allData.filter(i => !i.isSubmitted && i.deadlineTimestamp && (i.deadlineTimestamp - now) <= h3 && (i.deadlineTimestamp - now) > 0);
            } else if (type === 'completed') filteredData = allData.filter(i => i.isSubmitted);
            else if (type === 'forum') filteredData = allData.filter(i => i.type === 'forum');
            else if (type === 'student_activity') filteredData = allData.filter(i => i.type === 'student_activity');
            
            renderGrid();
        }

        function toggleTheme() {
            const root = document.documentElement;
            const icon = document.getElementById('theme-icon');
            root.classList.toggle('dark');
            const isDark = root.classList.contains('dark');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
