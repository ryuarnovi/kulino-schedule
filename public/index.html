<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulino Flow - Task Intelligence HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light Mode - Slate & Mist (Enhanced Contrast) */
            --primary: #1A1B27;
            --primary-rgb: 26, 27, 39;
            --primary-fg: #FFFFFF;
            --secondary: #475569;
            --accent: #1E293B;
            --accent-fg: #FFFFFF;
            --surface: #F1F5F9; 
            --background: #FFFFFF;
            --background-rgb: 255, 255, 255;
            --text-main: #0F172A;
            --text-muted: #334155;
            --glass-bg: rgba(241, 245, 249, 0.8);
            --glass-border: rgba(15, 23, 42, 0.15);
            
            --bg-accent-1: rgba(45, 55, 72, 0.1);
            --bg-accent-2: rgba(74, 85, 104, 0.05);
            --bg-accent-3: rgba(0, 0, 0, 0.02);
            --pattern-opacity: 0.04;
        }

        :root.dark {
            /* Dark Mode - Deep Space */
            --primary: #F8FAFB;
            --primary-rgb: 248, 250, 251;
            --primary-fg: #1E1E28;
            --secondary: #B8CFCE;
            --accent: #7F8CAA;
            --accent-fg: #FFFFFF;
            --surface: #1E1E28;
            --background: #0A0A0E;
            --background-rgb: 10, 10, 14;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --glass-bg: rgba(20, 20, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);

            --bg-accent-1: rgba(127, 140, 170, 0.15);
            --bg-accent-2: rgba(184, 207, 206, 0.1);
            --bg-accent-3: rgba(255, 255, 255, 0.02);
            --pattern-opacity: 0.05;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-feature-settings: "ss01", "ss02", "cv01", "cv02";
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* 💎 macOS CRYSTAL-LIQUID VIBRANCY */
        .glass {
            background: rgba(var(--background-rgb), 0.8);
            backdrop-filter: blur(20px) saturate(180%) brightness(1.1);
            -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.1);
            border: 1px solid rgba(var(--primary-rgb), 0.1);
            box-shadow: 
                0 10px 40px -10px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .dark .glass {
            background: rgba(var(--background-rgb), 0.75);
            backdrop-filter: blur(20px) saturate(180%) brightness(0.9);
            -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
        }

        /* 🏁 PATTERNS */
        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--text-main) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: var(--pattern-opacity);
            pointer-events: none;
            z-index: 0;
        }

        /* 🏔️ ENDFIELD - ENDMINISTRATOR HUD SYSTEM */
        .clip-corners {
            clip-path: polygon(
                15px 0%, 100% 0%, 
                100% calc(100% - 15px), 
                calc(100% - 15px) 100%, 
                0% 100%, 0% 15px
            );
        }

        .clip-corners-sm {
            clip-path: polygon(
                5px 0%, 100% 0%, 
                100% calc(100% - 5px), 
                calc(100% - 5px) 100%, 
                0% 100%, 0% 5px
            );
        }

        .hud-border {
            position: relative;
            border: 1px solid rgba(var(--primary-rgb), 0.1);
        }

        .hud-border::before,
        .hud-border::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            border-color: var(--accent);
            border-style: solid;
            pointer-events: none;
            z-index: 10;
        }

        .hud-border::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .hud-border::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .scanline::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, transparent 50%, rgba(var(--primary-rgb), 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.5;
        }

        .tech-text {
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .sidebar-active {
            background: var(--primary);
            color: var(--primary-fg) !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
    </style>
</head>
<body class="dark scanline">
    <div class="dot-grid"></div>
    
    <div class="flex flex-col md:flex-row h-screen relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 lg:w-72 flex flex-col border-r border-white/5 glass shrink-0">
            <div class="p-8">
                <div class="flex items-center gap-4 mb-2">
                    <div class="h-10 w-10 bg-primary-fg text-primary flex items-center justify-center clip-corners-sm shadow-xl">
                        <i data-lucide="command" class="h-6 w-6"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xl font-black italic tracking-tighter">TASK<span class="text-gradient">FLOW</span></span>
                        <span class="tech-text text-[8px] opacity-50">HUD OPERATING SYSTEM</span>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">
                <button onclick="filterType('all')" class="nav-btn sidebar-active w-full flex items-center gap-3 px-6 py-3.5 rounded-lg clip-corners-sm transition-all group">
                    <i data-lucide="layout-grid" class="h-4 w-4"></i>
                    <span class="text-xs font-bold tech-text">ALL_TASKS</span>
                </button>
                <button onclick="filterType('urgent')" class="nav-btn w-full flex items-center gap-3 px-6 py-3.5 rounded-lg clip-corners-sm hover:bg-white/5 transition-all text-text-muted group">
                    <i data-lucide="alert-triangle" class="h-4 w-4 group-hover:text-amber-500"></i>
                    <span class="text-xs font-bold tech-text">URGENT_ONLY</span>
                </button>
                <button onclick="filterType('completed')" class="nav-btn w-full flex items-center gap-3 px-6 py-3.5 rounded-lg clip-corners-sm hover:bg-white/5 transition-all text-text-muted group">
                    <i data-lucide="check-square" class="h-4 w-4 group-hover:text-emerald-500"></i>
                    <span class="text-xs font-bold tech-text">COMPLETED</span>
                </button>
            </nav>

            <div class="p-6">
                <div class="p-5 glass clip-corners-sm border border-white/10">
                    <div class="flex items-center justify-between mb-4">
                        <span class="tech-text text-[9px] opacity-40">SYSTEM_STATUS</span>
                        <div class="h-1.5 w-1.5 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                    </div>
                    <button onclick="loadData()" class="w-full py-2.5 bg-primary text-primary-fg tech-text text-[10px] font-black hover:brightness-125 transition-all clip-corners-sm">
                        SYNC_DATABASE
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Body -->
        <main class="flex-1 flex flex-col min-w-0 bg-transparent relative">
            <header class="h-20 flex items-center justify-between px-10 border-b border-white/5 backdrop-blur-3xl sticky top-0 z-50">
                <div class="relative w-full max-w-xl group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 opacity-30 group-focus-within:opacity-100 transition-opacity"></i>
                    <input type="text" id="search-input" placeholder="ACCESS_DATABASE_QUERY..." 
                           class="w-full pl-12 pr-6 py-3 bg-white/5 border border-white/5 focus:border-accent/40 rounded-full tech-text text-[11px] focus:outline-none transition-all placeholder:opacity-30"
                           oninput="handleSearch()">
                </div>

                <div class="flex items-center gap-8">
                    <div class="hidden lg:flex flex-col items-end">
                        <span class="tech-text text-[9px] opacity-40">LATENCY_STABLE</span>
                        <span id="last-update" class="text-xs font-black italic text-gradient">STATUS_READY</span>
                    </div>
                    <button onclick="toggleTheme()" class="h-10 w-10 glass rounded-full flex items-center justify-center hover:scale-110 transition-all border-accent/20">
                        <i data-lucide="sun" id="theme-icon" class="h-4 w-4 text-accent"></i>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <div class="p-10 max-w-7xl mx-auto space-y-12">
                    <!-- Stats Area -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        <div class="glass p-6 clip-corners-sm hud-border">
                            <span class="tech-text text-[10px] opacity-40 block mb-2">TOTAL_RECORDS</span>
                            <span class="text-3xl font-black italic" id="stat-total">0</span>
                        </div>
                        <div class="glass p-6 clip-corners-sm hud-border">
                            <span class="tech-text text-[10px] opacity-40 block mb-2">ACTIVE_COURSES</span>
                            <span class="text-3xl font-black italic" id="stat-courses">0</span>
                        </div>
                        <div class="glass p-6 clip-corners-sm hud-border border-amber-500/20">
                            <span class="tech-text text-[10px] text-amber-500/60 block mb-2">URGENT_TASKS</span>
                            <span class="text-3xl font-black italic text-amber-500" id="stat-urgent">0</span>
                        </div>
                        <div class="glass p-6 clip-corners-sm hud-border border-emerald-500/20">
                            <span class="tech-text text-[10px] text-emerald-500/60 block mb-2">COMPLETED_OPS</span>
                            <span class="text-3xl font-black italic text-emerald-500" id="stat-done">0</span>
                        </div>
                    </div>

                    <!-- Dynamic Container -->
                    <div id="grid-container" class="space-y-16 pb-24">
                        <!-- Loading State -->
                        <div class="flex flex-col items-center justify-center py-32 tech-text opacity-40">
                            <div class="animate-spin h-12 w-12 border-2 border-t-accent border-white/5 rounded-full mb-6"></div>
                            <span class="animate-pulse tracking-[0.5em]">INITIALIZING_HUD_CORE...</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allData = [];
        let filteredData = [];

        async function init() {
            lucide.createIcons();
            await loadData();
        }

        async function loadData() {
            try {
                const container = document.getElementById('grid-container');
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 tech-text opacity-50">
                        <div class="animate-spin h-12 w-12 border-2 border-t-accent border-white/5 rounded-full mb-6"></div>
                        <span class="animate-pulse tracking-[0.4em]">SCRAPING_SESSION_ACTIVE...</span>
                    </div>
                `;

                let res = await fetch('/deadlines.json?t=' + Date.now()).catch(() => null);
                let data = [];
                if (res && res.ok) data = await res.json().catch(() => []);

                if (data.length === 0) {
                    res = await fetch('/api/scrape?t=' + Date.now());
                    if (!res.ok) throw new Error('CONNECTION_LOST');
                    data = await res.json();
                }

                allData = Array.isArray(data) ? data : [];
                allData.sort((a, b) => (a.deadlineTimestamp || 0) - (b.deadlineTimestamp || 0));
                
                filteredData = [...allData];
                updateStats();
                renderGrid();
                
            } catch (e) {
                document.getElementById('grid-container').innerHTML = `
                    <div class="text-center py-32 glass clip-corners hud-border border-rose-500/30">
                        <i data-lucide="terminal" class="h-16 w-16 text-rose-500 mx-auto mb-6"></i>
                        <h2 class="tech-text text-xl font-black italic mb-2 tracking-widest">CRITICAL_EXCEPTION</h2>
                        <p class="text-xs font-mono text-rose-400 mb-8 opacity-70">${e.message}</p>
                        <button onclick="loadData()" class="px-10 py-3 bg-rose-500 text-white tech-text text-xs font-black clip-corners-sm hover:brightness-125 transition-all">
                            RETRY_CONNECTION
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function updateStats() {
            const courseSet = new Set(allData.map(i => i.course));
            const now = Date.now();
            const h3 = 3 * 24 * 60 * 60 * 1000;
            const urgentCount = allData.filter(i => !i.isSubmitted && i.deadlineTimestamp && (i.deadlineTimestamp - now) <= h3 && (i.deadlineTimestamp - now) > 0).length;
            const doneCount = allData.filter(i => i.isSubmitted).length;

            document.getElementById('stat-total').innerText = allData.length;
            document.getElementById('stat-courses').innerText = courseSet.size;
            document.getElementById('stat-urgent').innerText = urgentCount;
            document.getElementById('stat-done').innerText = doneCount;
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 opacity-20 tech-text">
                        <i data-lucide="layers" class="h-20 w-20 mb-6"></i>
                        <span class="tracking-[0.5em]">BUFFER_EMPTY</span>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const groups = filteredData.reduce((acc, item) => {
                const c = item.course || "GENERAL_ARCHIVE";
                if (!acc[c]) acc[c] = [];
                acc[c].push(item);
                return acc;
            }, {});

            container.innerHTML = Object.entries(groups).map(([courseName, items], gIdx) => {
                const now = Date.now();
                const h3 = 3 * 24 * 60 * 60 * 1000;

                return `
                <div class="animate-slide-in" style="animation-delay: ${gIdx * 100}ms">
                    <div class="flex items-center gap-6 mb-8 group">
                        <div class="h-10 w-1.5 bg-accent group-hover:scale-y-110 transition-transform"></div>
                        <h2 class="text-xs font-black tech-text opacity-40 flex items-center gap-4">
                            ${courseName}
                            <span class="h-px w-20 bg-white/5"></span>
                            <span class="italic text-[10px] tracking-normal">${items.length} records detected</span>
                        </h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${items.map(item => {
                            const isDone = item.isSubmitted;
                            const isUrgent = !isDone && item.deadlineTimestamp && (item.deadlineTimestamp - now) <= h3 && (item.deadlineTimestamp - now) > 0;
                            const deadlineLabel = item.deadline || (item.deadlineTimestamp ? new Date(item.deadlineTimestamp).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) : '');

                            return `
                                <div class="glass p-8 clip-corners hud-border hover-lift group h-full flex flex-col ${isDone ? 'opacity-40 saturate-50' : (isUrgent ? 'border-amber-500/20' : '')}">
                                    ${isUrgent ? `<div class="absolute top-0 right-0 bg-amber-500 text-black tech-text text-[8px] font-black px-4 py-1.5 clip-corners-sm animate-pulse">URGENT</div>` : ''}
                                    ${isDone ? `<div class="absolute top-0 right-0 bg-emerald-500 text-black tech-text text-[8px] font-black px-4 py-1.5 clip-corners-sm">ARCHIVED</div>` : ''}
                                    
                                    <div class="mb-4">
                                        <div class="h-px w-8 bg-accent/30 mb-4 group-hover:w-full transition-all duration-700"></div>
                                        <h4 class="text-sm font-bold leading-relaxed tracking-tight ${isDone ? 'line-through' : ''}">${item.title}</h4>
                                    </div>

                                    <div class="mt-auto space-y-6">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-2 tech-text text-[9px] ${isDone ? 'text-emerald-500' : (isUrgent ? 'text-amber-500' : 'opacity-40')}">
                                                <i data-lucide="${isDone ? 'check-circle' : 'clock'}" class="h-3 w-3"></i>
                                                <span>${isDone ? 'OPS_COMPLETE' : (deadlineLabel || 'NO_DEADLINE')}</span>
                                            </div>
                                            <span class="tech-text text-[8px] opacity-20">${item.type || 'TASK'}</span>
                                        </div>

                                        <a href="${item.url}" target="_blank" class="w-full flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 transition-all clip-corners-sm tech-text text-[9px] font-black group/link">
                                            ACCESS_SYSTEM
                                            <i data-lucide="arrow-right" class="h-3 w-3 group-hover/link:translate-x-1 transition-transform text-accent"></i>
                                        </a>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            filteredData = allData.filter(item => 
                item.title.toLowerCase().includes(term) || 
                item.course.toLowerCase().includes(term)
            );
            renderGrid();
        }

        function filterType(type) {
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => b.classList.remove('sidebar-active'));
            event.currentTarget.classList.add('sidebar-active');

            if (type === 'all') filteredData = [...allData];
            else if (type === 'urgent') {
                const now = Date.now();
                const h3 = 3 * 24 * 60 * 60 * 1000;
                filteredData = allData.filter(i => !i.isSubmitted && i.deadlineTimestamp && (i.deadlineTimestamp - now) <= h3 && (i.deadlineTimestamp - now) > 0);
            } else if (type === 'completed') filteredData = allData.filter(i => i.isSubmitted);
            
            renderGrid();
        }

        function toggleTheme() {
            const root = document.documentElement;
            const icon = document.getElementById('theme-icon');
            root.classList.toggle('dark');
            const isDark = root.classList.contains('dark');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
