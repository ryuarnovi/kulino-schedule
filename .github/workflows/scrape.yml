name: Kulino Scraper Engine

on:
  schedule:
    - cron: '0 */4 * * *' # Run setiap 4 jam
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run Scraper
        run: node scripts/scrape-all.js
        env:
          KULINO_USERNAME: ${{ secrets.KULINO_USERNAME }}
          KULINO_PASSWORD: ${{ secrets.KULINO_PASSWORD }}

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/deadlines.json
          git commit -m "chore: auto-sync kulino deadlines [skip ci]" || echo "No changes"
          git push
